services:
  api:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - runner-control
      - egress

  web:
    ports: !reset []
    networks:
      - backend
      - edge

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-cadir-edge}
