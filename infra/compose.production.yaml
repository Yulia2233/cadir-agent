services:
  opencode:
    ports: !reset []
    networks:
      - backend
      - egress
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
          pids: 128
        reservations:
          cpus: '0.25'
          memory: 256M

  api:
    environment:
      NODE_ENV: production
      COOKIE_SECURE: 'true'
      BOOTSTRAP_ADMIN_ENABLED: 'false'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - backend
      - runner-control
      - egress

  web:
    ports: !reset []
    networks:
      - backend
      - edge

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-cadir-edge}
