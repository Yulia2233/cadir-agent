name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:integration

  migration:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17.5-bookworm
        env:
          POSTGRES_DB: cadir
          POSTGRES_USER: cadir
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cadir -d cadir"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://cadir:test-only-password@127.0.0.1:5432/cadir?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cadir/api db:generate
      - run: pnpm --filter @cadir/api exec prisma validate
      - run: pnpm --filter @cadir/api exec prisma migrate deploy

  containers:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: false
          tags: cadir-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: false
          tags: cadir-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Runner image
        run: docker build -f services/runner/Dockerfile -t cadir-runner:ci .
      - name: Verify Runner container isolation
        env:
          RUNNER_IMAGE: cadir-runner:ci
        run: node tests/deployment/verify-runner-container.mjs
      - name: Verify Runner CAD kernel and canonical exports
        env:
          RUNNER_IMAGE: cadir-runner:ci
        run: node tests/deployment/verify-runner-cad.mjs
      - name: Scan filesystem
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
